# ============================================
# Smart Lost & Found - CI Pipeline
# Runs on every push and PR to main/develop
# ============================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Backend Lint & Test
  # ============================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check server.js

      - name: Check all model files
        run: |
          for f in models/*.js; do node --check "$f"; done

      - name: Check all controller files
        run: |
          for f in controllers/*.js; do node --check "$f"; done

      - name: Check all route files
        run: |
          for f in routes/*.js; do node --check "$f"; done

      - name: Check all middleware files
        run: |
          for f in middlewares/*.js; do node --check "$f"; done

      - name: Check all service files
        run: |
          for f in services/*.js; do node --check "$f"; done

      - name: Check all utility files
        run: |
          for f in utils/*.js; do node --check "$f"; done

      - name: Run seed script (test)
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/smart-lost-found-test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-for-ci-pipeline-32chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-ci-pipeline-32ch
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          COOKIE_SECRET: test-cookie-secret
          CLIENT_URL: http://localhost:5173
        run: node seed/seed.js

      - name: Verify server starts
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://localhost:27017/smart-lost-found-test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-for-ci-pipeline-32chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-ci-pipeline-32ch
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          COOKIE_SECRET: test-cookie-secret
          CLIENT_URL: http://localhost:5173
        run: |
          timeout 10 node server.js &
          sleep 5
          curl -f http://localhost:5001/api/health || exit 1
          kill %1 || true

  # ============================================
  # Frontend Lint & Build
  # ============================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_SOCKET_URL: http://localhost:5000
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist || exit 1
          test -f dist/index.html || exit 1
          echo "✅ Build output verified"

      - name: Check bundle size
        run: |
          SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          if [ "$SIZE" -gt 5120 ]; then
            echo "⚠️ Warning: Bundle size exceeds 5MB"
          fi

  # ============================================
  # Docker Build Test
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker image
        run: docker build -t smartlf-backend:test ./backend

      - name: Build Frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:5000/api \
            --build-arg VITE_SOCKET_URL=http://localhost:5000 \
            -t smartlf-frontend:test ./frontend

      - name: Test Docker Compose
        run: |
          docker compose up -d mongodb redis
          sleep 10
          docker compose up -d backend
          sleep 5
          docker compose ps
          docker compose down -v
